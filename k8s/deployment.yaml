apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-bridge
  labels:
    app: project-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-bridge
  template:
    metadata:
      labels:
        app: project-bridge
    spec:
      containers:
        - name: project-bridge
          image: srvhpgit1:32050/project-bridge:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: project-bridge-secret
                  key: gemini-api-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/packages/server/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: project-bridge-data
