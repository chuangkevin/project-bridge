name: Deploy to Server via Tailscale

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Exact image tag to deploy (commit SHA or explicit tag)'
        required: true
        type: string

env:
  DOCKERHUB_USERNAME: kevin950805
  IMAGE_NAME: project-bridge

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve image tag
        id: resolve-image
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Test Tailscale Connection
        run: |
          echo "Testing connection to deployment server..."
          tailscale status
          ping -c 3 ${{ secrets.DEPLOY_SERVER_IP }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync docker-compose.yml to server
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ steps.resolve-image.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_SERVER_IP}" "mkdir -p '${DEPLOY_PATH}'"
          scp -i ~/.ssh/deploy_key docker-compose.yml "${DEPLOY_USER}@${DEPLOY_SERVER_IP}:${DEPLOY_PATH}/docker-compose.yml"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_SERVER_IP}" "printf 'IMAGE_TAG=${IMAGE_TAG}\n' > '${DEPLOY_PATH}/.env'"

      - name: Deploy via SSH
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ steps.resolve-image.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_SERVER_IP}" "
            set -e

            retry_pull() {
              local max_attempts=3
              local attempt=1
              local delay=10

              while [ \$attempt -le \$max_attempts ]; do
                echo \"Pulling Docker images (attempt \$attempt/\$max_attempts)...\"
                if docker compose -f docker-compose.yml pull; then
                  echo \"Pull successful!\"
                  return 0
                fi

                if [ \$attempt -lt \$max_attempts ]; then
                  echo \"Pull failed, retrying in \${delay}s...\"
                  sleep \$delay
                  delay=\$((delay * 2))
                fi
                attempt=\$((attempt + 1))
              done

              echo \"Pull failed after \$max_attempts attempts\"
              return 1
            }

            echo \"Navigating to deployment directory...\"
            cd \"${DEPLOY_PATH}\"

            export IMAGE_TAG='${IMAGE_TAG}'

            retry_pull

            echo \"Force removing any leftover containers...\"
            docker rm -f project-bridge 2>/dev/null || true

            echo \"Stopping existing containers...\"
            docker compose -f docker-compose.yml down --remove-orphans --volumes=false

            echo \"Starting updated containers...\"
            docker compose -f docker-compose.yml up -d --force-recreate

            echo \"Cleaning up old images...\"
            docker image prune -af --filter \"until=24h\" || true

            echo \"Deployment completed successfully!\"
            docker compose -f docker-compose.yml ps
          "

      - name: Health Check
        run: |
          echo "Performing health check (waits up to 60s for the server to bind)..."
          # First boot can take 10-20s for migrations + bcrypt/better-sqlite3 native load.
          for i in 1 2 3 4 5 6; do
            sleep 10
            if curl -fsS --max-time 5 "http://${{ secrets.DEPLOY_SERVER_IP }}:5123/health" >/dev/null; then
              echo "Health check passed on attempt $i (${i}0s after deploy)."
              exit 0
            fi
            echo "  attempt $i: not ready yet, retrying..."
          done
          echo "Health check FAILED after 60s. Capturing container logs for diagnosis..."
          exit 1

      - name: Capture container logs on failure
        if: failure()
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_SERVER_IP}" "
            set +e
            echo '=== container ps ==='
            cd '${DEPLOY_PATH}' && docker compose -f docker-compose.yml ps -a
            echo
            echo '=== last 200 lines of project-bridge logs ==='
            docker logs --tail 200 project-bridge 2>&1 || true
            echo
            echo '=== docker inspect (state) ==='
            docker inspect project-bridge --format '{{json .State}}' 2>&1 || true
          "

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: \`${{ secrets.DEPLOY_SERVER_IP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.resolve-image.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Port**: 5123:3001" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deployment failed! Please check the logs above." >> $GITHUB_STEP_SUMMARY
