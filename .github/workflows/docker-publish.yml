name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: tag
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to Internal Registry
        run: |
          docker build \
            -t srvhpgit1:32050/project-bridge:${{ github.sha }} \
            -t srvhpgit1:32050/project-bridge:latest \
            .
          docker push srvhpgit1:32050/project-bridge:${{ github.sha }}
          docker push srvhpgit1:32050/project-bridge:latest

      - name: Clean Up Local Images
        run: |
          docker rmi -f srvhpgit1:32050/project-bridge:${{ github.sha }} || true
          docker rmi -f srvhpgit1:32050/project-bridge:latest || true
