name: CI — Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: project-bridge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
