services:
  project-bridge:
    image: kevin950805/project-bridge:${IMAGE_TAG:-latest}
    container_name: project-bridge
    restart: unless-stopped
    ports:
      - "5123:3001"
    volumes:
      - project-bridge-data:/app/packages/server/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      - MAX_BROWSER_SESSIONS=1
      # External URL the user's browser hits — baked into the downloadable
      # OpenAI OAuth helper so it knows where to POST tokens after the user
      # signs in on their local machine. REQUIRED in prod: behind a reverse
      # proxy the server can't reliably autodetect this. Override via the
      # root .env file when deploying to a different domain.
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://designbridge.housefun.com.tw}
      # OpenAI OAuth PKCE — Codex CLI public client_id. Override via root .env if needed.
      - OPENAI_OAUTH_CLIENT_ID=${OPENAI_OAUTH_CLIENT_ID:-app_EMoamEEZ73f0CkXaXp7hrann}
      # OpenCode server — centralised AI gateway replacing the Gemini key pool.
      - OPENCODE_URL=${OPENCODE_URL:-http://opencode:4096}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      # Optional: override OAuth endpoints / redirect uri / scope.
      # - OPENAI_OAUTH_AUTHORIZE_URL=https://auth.openai.com/oauth/authorize
      # - OPENAI_OAUTH_TOKEN_URL=https://auth.openai.com/oauth/token
      # - OPENAI_OAUTH_SCOPE=openid profile email offline_access
      # - OPENAI_OAUTH_REDIRECT_URI=https://designbridge.housefun.com.tw/api/openai-oauth/callback

volumes:
  project-bridge-data:
