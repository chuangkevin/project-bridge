services:
  project-bridge:
    image: kevin950805/project-bridge:${IMAGE_TAG:-latest}
    container_name: project-bridge
    restart: unless-stopped
    ports:
      - "5123:3001"
    volumes:
      - project-bridge-data:/app/packages/server/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      - MAX_BROWSER_SESSIONS=1
      # OpenAI OAuth PKCE — Codex CLI public client_id. Override via root .env if needed.
      - OPENAI_OAUTH_CLIENT_ID=${OPENAI_OAUTH_CLIENT_ID:-app_EMoamEEZ73f0CkXaXp7hrann}
      # Optional: override OAuth endpoints / redirect uri / scope.
      # - OPENAI_OAUTH_AUTHORIZE_URL=https://auth.openai.com/authorize
      # - OPENAI_OAUTH_TOKEN_URL=https://auth.openai.com/token
      # - OPENAI_OAUTH_SCOPE=openid profile email offline_access
      # - OPENAI_OAUTH_REDIRECT_URI=https://designbridge.housefun.com.tw/api/openai-oauth/callback
      # - PUBLIC_BASE_URL=https://designbridge.housefun.com.tw

volumes:
  project-bridge-data:
