name: Build and Deploy Project Bridge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          echo "Building image with tag: $IMAGE_TAG and latest"
          docker build --network=host \
            -t srvhpgit1:32050/project-bridge:$IMAGE_TAG \
            -t srvhpgit1:32050/project-bridge:latest \
            .

      - name: Push to Internal Registry
        run: |
          docker push srvhpgit1:32050/project-bridge:$IMAGE_TAG
          docker push srvhpgit1:32050/project-bridge:latest

      - name: Clean Up Local Images
        run: |
          docker rmi -f srvhpgit1:32050/project-bridge:$IMAGE_TAG || true
          docker rmi -f srvhpgit1:32050/project-bridge:latest || true

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      GIT_USER: ${{ secrets.GIT_USERNAME }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
      ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
      ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
    steps:
      - name: Set Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Update Image Tag in Argo App Repo
        run: |
          git clone --branch main http://${GIT_USER}:${GIT_TOKEN}@srvhpgit:32000/HF_RD/argo-app.git argo-app
          cd argo-app
          git config user.email "gitea-actions@gitea.local"
          git config user.name "Gitea Bot"
          sed -i "s|newTag: .*|newTag: $IMAGE_TAG|" project-bridge/kustomization.yaml
          git add project-bridge/kustomization.yaml
          git commit -m "Update project-bridge image tag to $IMAGE_TAG" || echo "No changes"
          git push http://${GIT_USER}:${GIT_TOKEN}@srvhpgit:32000/HF_RD/argo-app.git HEAD:main

      - name: Resolve ArgoCD host
        run: |
          ARGOCD_IP=$(getent hosts srvhpgit1 | awk '{print $1}' || echo "")
          if [ -z "$ARGOCD_IP" ]; then
            ARGOCD_IP=$(dig +short srvhpgit1 @10.43.0.10 || echo "")
          fi
          if [ -z "$ARGOCD_IP" ]; then
            echo "WARNING: Cannot resolve srvhpgit1, trying nslookup..."
            ARGOCD_IP=$(nslookup srvhpgit1 10.43.0.10 2>/dev/null | grep -A1 'Name:' | grep 'Address:' | awk '{print $2}' || echo "")
          fi
          echo "Resolved srvhpgit1 to: $ARGOCD_IP"
          echo "ARGOCD_IP=$ARGOCD_IP" >> $GITHUB_ENV

      - name: ArgoCD Sync
        run: |
          EXTRA_HOSTS=""
          if [ -n "$ARGOCD_IP" ]; then
            EXTRA_HOSTS="--add-host srvhpgit1:$ARGOCD_IP"
          fi
          docker run --rm -i $EXTRA_HOSTS \
            -e ARGOCD_USERNAME="${ARGOCD_USERNAME}" \
            -e ARGOCD_PASSWORD="${ARGOCD_PASSWORD}" \
            argoproj/argocd:v2.6.15 /bin/sh -c '
              set -e
              echo "y" | argocd login srvhpgit1:30091 --insecure \
                --username "$ARGOCD_USERNAME" \
                --password "$ARGOCD_PASSWORD" \
                --grpc-web
              argocd app sync project-bridge --force --grpc-web
            '
